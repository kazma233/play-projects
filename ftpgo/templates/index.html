<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件管理器</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.5.29/dist/vue.global.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.2.0/css/all.min.css">
    <style>
        .file-drop-zone {
            border: 2px dashed #e5e7eb;
            transition: all 0.3s ease;
        }
        .file-drop-zone.dragover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        .file-item:hover {
            background-color: #f3f4f6;
        }
        .breadcrumb-item:not(:last-child)::after {
            content: '/';
            margin: 0 8px;
            color: #9ca3af;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app">
        <!-- 顶部导航栏 -->
        <nav class="bg-white shadow-sm border-b">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <i class="fas fa-folder-open text-blue-600 text-2xl mr-3"></i>
                        <h1 class="text-xl font-bold text-gray-900">文件管理器</h1>
                    </div>
                </div>
            </div>
        </nav>

        <!-- 主内容区 -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- 工具栏 -->
            <div class="bg-white rounded-lg shadow p-4 mb-6">
                <div class="flex flex-wrap items-center justify-between gap-4">
                    <!-- 面包屑导航 -->
                    <div class="flex items-center flex-wrap">
                        <button @click="navigateTo('')" class="text-blue-600 hover:text-blue-800 font-medium">
                            <i class="fas fa-home mr-1"></i>根目录
                        </button>
                        <template v-for="(segment, index) in pathSegments" :key="index">
                            <span class="breadcrumb-item"></span>
                            <button @click="navigateToSegment(index)" class="text-blue-600 hover:text-blue-800">
                                {{ segment }}
                            </button>
                        </template>
                    </div>

                    <!-- 操作按钮 -->
                    <div class="flex items-center space-x-2">
                        <button @click="showNewFolderModal = true" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 transition">
                            <i class="fas fa-folder-plus mr-2"></i>新建文件夹
                        </button>
                        <label class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition cursor-pointer">
                            <i class="fas fa-upload mr-2"></i>上传文件
                            <input type="file" multiple class="hidden" @change="handleFileUpload" ref="fileInput">
                        </label>
                        <label class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 transition cursor-pointer">
                            <i class="fas fa-folder-plus mr-2"></i>上传文件夹
                            <input type="file" webkitdirectory directory multiple class="hidden" @change="handleFolderUpload" ref="folderInput">
                        </label>
                        <button v-if="selectedFiles.length > 0" @click="downloadSelected" class="px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700 transition">
                            <i class="fas fa-download mr-2"></i>下载选中 ({{ selectedFiles.length }})
                        </button>
                        <button v-if="selectedFiles.length > 0" @click="deleteSelected" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition">
                            <i class="fas fa-trash mr-2"></i>删除
                        </button>
                    </div>
                </div>
            </div>

            <!-- 拖拽上传区域 -->
            <div 
                class="file-drop-zone rounded-lg bg-white p-8 mb-6 text-center"
                :class="{ 'dragover': isDragging }"
                @dragenter.prevent="isDragging = true"
                @dragleave.prevent="isDragging = false"
                @dragover.prevent
                @drop.prevent="handleDrop"
            >
                <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-4"></i>
                <p class="text-gray-600">拖拽文件或文件夹到此处上传</p>
            </div>

            <!-- 文件列表 -->
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left">
                                <input type="checkbox" :checked="isAllSelected" @change="toggleSelectAll" class="rounded border-gray-300">
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">名称</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">大小</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">修改时间</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <!-- 返回上级 -->
                        <tr v-if="currentPath" class="file-item cursor-pointer" @dblclick="navigateUp">
                            <td class="px-6 py-4"></td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center">
                                    <i class="fas fa-level-up-alt text-gray-400 text-lg mr-3"></i>
                                    <span class="text-gray-600">..</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-500">-</td>
                            <td class="px-6 py-4 whitespace-nowrap text-gray-500">-</td>
                            <td class="px-6 py-4 whitespace-nowrap"></td>
                        </tr>

                        <!-- 文件列表 -->
                        <tr v-for="file in files" :key="file.path" class="file-item">
                            <td class="px-6 py-4">
                                <input type="checkbox" v-model="selectedFiles" :value="file.path" class="rounded border-gray-300">
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center cursor-pointer" @click="file.isDir ? navigateTo(file.path) : previewFile(file)">
                                    <i :class="getFileIcon(file)" class="text-lg mr-3"></i>
                                    <span class="text-sm font-medium text-gray-900 hover:text-blue-600">{{ file.name }}</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                {{ file.isDir ? '-' : formatSize(file.size) }}
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                {{ formatDate(file.modTime) }}
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                                <button v-if="!file.isDir" @click="downloadFile(file.path)" class="text-blue-600 hover:text-blue-900 mr-3">
                                    <i class="fas fa-download"></i>
                                </button>
                                <button @click="showRenameModal(file)" class="text-yellow-600 hover:text-yellow-900 mr-3">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button @click="deleteFile(file.path)" class="text-red-600 hover:text-red-900">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>

                        <!-- 空状态 -->
                        <tr v-if="files.length === 0 && !currentPath">
                            <td colspan="5" class="px-6 py-12 text-center text-gray-500">
                                <i class="fas fa-folder-open text-4xl mb-4"></i>
                                <p>文件夹为空</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>

        <!-- 新建文件夹弹窗 -->
        <div v-if="showNewFolderModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
            <div class="bg-white rounded-lg p-6 w-96">
                <h3 class="text-lg font-bold mb-4">新建文件夹</h3>
                <input v-model="newFolderName" type="text" placeholder="文件夹名称" class="w-full px-3 py-2 border rounded mb-4" @keyup.enter="createFolder">
                <div class="flex justify-end space-x-2">
                    <button @click="showNewFolderModal = false" class="px-4 py-2 text-gray-600 hover:text-gray-800">取消</button>
                    <button @click="createFolder" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">确定</button>
                </div>
            </div>
        </div>

        <!-- 重命名弹窗 -->
        <div v-if="showRenameDialog" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
            <div class="bg-white rounded-lg p-6 w-96">
                <h3 class="text-lg font-bold mb-4">重命名</h3>
                <input v-model="renameNewName" type="text" placeholder="新名称" class="w-full px-3 py-2 border rounded mb-4" @keyup.enter="doRename">
                <div class="flex justify-end space-x-2">
                    <button @click="showRenameDialog = false" class="px-4 py-2 text-gray-600 hover:text-gray-800">取消</button>
                    <button @click="doRename" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">确定</button>
                </div>
            </div>
        </div>

        <!-- 文件预览弹窗 -->
        <div v-if="showPreview" class="fixed inset-0 bg-black/75 flex items-center justify-center z-50" @click="showPreview = false">
            <div class="bg-white rounded-lg p-4 max-w-4xl max-h-[90vh] overflow-auto min-w-[400px]" @click.stop>
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold">{{ previewFileName }}</h3>
                    <button @click="showPreview = false" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                <div class="flex justify-center">
                    <img v-if="isImage" :src="previewUrl" class="max-w-full max-h-[70vh] object-contain" />
                    <div v-else class="text-center py-12">
                        <i class="fas fa-file text-6xl text-gray-400 mb-4"></i>
                        <p class="text-gray-600 mb-4">该文件类型暂不支持预览</p>
                        <button @click="downloadFile(previewPath)" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
                            <i class="fas fa-download mr-2"></i>下载文件
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 上传进度 -->
        <div v-if="uploadProgress > 0 && uploadProgress < 100" class="fixed bottom-4 right-4 bg-white rounded-lg shadow-lg p-4 w-80">
            <div class="flex items-center justify-between mb-2">
                <span class="text-sm font-medium">上传中...</span>
                <span class="text-sm text-gray-500">{{ uploadProgress }}%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2">
                <div class="bg-blue-600 h-2 rounded-full transition-all duration-300" :style="{ width: uploadProgress + '%' }"></div>
            </div>
        </div>

        <!-- 消息提示 -->
        <div v-if="message" :class="['fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg', messageType === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white']">
            {{ message }}
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const files = ref([]);
                const currentPath = ref('');
                const selectedFiles = ref([]);
                const isDragging = ref(false);
                const showNewFolderModal = ref(false);
                const showRenameDialog = ref(false);
                const newFolderName = ref('');
                const renameOldPath = ref('');
                const renameNewName = ref('');
                const uploadProgress = ref(0);
                const message = ref('');
                const messageType = ref('success');
                const fileInput = ref(null);
                const folderInput = ref(null);
                
                // 预览相关
                const showPreview = ref(false);
                const previewPath = ref('');
                const previewFileName = ref('');
                const previewUrl = computed(() => `/api/download?path=${encodeURIComponent(previewPath.value)}`);
                const isImage = computed(() => {
                    const ext = previewFileName.value.split('.').pop().toLowerCase();
                    return ['jpg', 'jpeg', 'png', 'gif', 'webp', 'bmp'].includes(ext);
                });

                const pathSegments = computed(() => {
                    return currentPath.value ? currentPath.value.split('/').filter(Boolean) : [];
                });

                const isAllSelected = computed(() => {
                    return files.value.length > 0 && selectedFiles.value.length === files.value.length;
                });

                const showMessage = (msg, type = 'success') => {
                    message.value = msg;
                    messageType.value = type;
                    setTimeout(() => { message.value = ''; }, 3000);
                };

                const loadFiles = async () => {
                    try {
                        const response = await fetch(`/api/browse?path=${encodeURIComponent(currentPath.value)}`);
                        const data = await response.json();
                        files.value = data.files || [];
                        selectedFiles.value = [];
                    } catch (error) {
                        showMessage('加载文件失败: ' + error.message, 'error');
                    }
                };

                const navigateTo = (path) => {
                    currentPath.value = path;
                    loadFiles();
                };

                const navigateUp = () => {
                    const parts = currentPath.value.split('/').filter(Boolean);
                    parts.pop();
                    navigateTo(parts.join('/'));
                };

                const navigateToSegment = (index) => {
                    const parts = pathSegments.value.slice(0, index + 1);
                    navigateTo(parts.join('/'));
                };

                const getFileIcon = (file) => {
                    if (file.isDir) return 'fas fa-folder text-yellow-500';
                    const ext = file.name.split('.').pop().toLowerCase();
                    const iconMap = {
                        'jpg': 'fas fa-image text-purple-500',
                        'jpeg': 'fas fa-image text-purple-500',
                        'png': 'fas fa-image text-purple-500',
                        'gif': 'fas fa-image text-purple-500',
                        'mp4': 'fas fa-video text-red-500',
                        'mp3': 'fas fa-music text-blue-500',
                        'pdf': 'fas fa-file-pdf text-red-600',
                        'doc': 'fas fa-file-word text-blue-600',
                        'docx': 'fas fa-file-word text-blue-600',
                        'xls': 'fas fa-file-excel text-green-600',
                        'xlsx': 'fas fa-file-excel text-green-600',
                        'zip': 'fas fa-file-archive text-yellow-600',
                        'txt': 'fas fa-file-alt text-gray-500'
                    };
                    return iconMap[ext] || 'fas fa-file text-gray-400';
                };

                const formatSize = (bytes) => {
                    if (bytes === 0) return '0 B';
                    const k = 1024;
                    const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
                    const i = Math.floor(Math.log(bytes) / Math.log(k));
                    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
                };

                const formatDate = (dateStr) => {
                    const date = new Date(dateStr);
                    return date.toLocaleString('zh-CN');
                };

                const toggleSelectAll = () => {
                    if (isAllSelected.value) {
                        selectedFiles.value = [];
                    } else {
                        selectedFiles.value = files.value.map(f => f.path);
                    }
                };

                const handleFileUpload = async (event) => {
                    await uploadFiles(event.target.files);
                    event.target.value = '';
                };

                const handleFolderUpload = async (event) => {
                    const files = event.target.files;
                    // 文件夹上传：浏览器会自动设置 webkitRelativePath 属性
                    // 将 webkitRelativePath 赋值给 relativePath 以便统一处理
                    for (let i = 0; i < files.length; i++) {
                        files[i].relativePath = files[i].webkitRelativePath || files[i].name;
                    }
                    await uploadFiles(files);
                    event.target.value = '';
                };

                const handleDrop = async (event) => {
                    isDragging.value = false;
                    const items = event.dataTransfer.items;
                    const files = [];

                    console.log('[DEBUG] handleDrop called');
                    console.log('[DEBUG] items.length:', items.length);

                    // 检查是否支持 webkitGetAsEntry
                    const supportsGetAsEntry = typeof items[0]?.webkitGetAsEntry === 'function';
                    console.log('[DEBUG] supportsGetAsEntry:', supportsGetAsEntry);

                    if (supportsGetAsEntry) {
                        // 使用 webkitGetAsEntry 遍历文件夹结构
                        for (let i = 0; i < items.length; i++) {
                            const item = items[i].webkitGetAsEntry();
                            if (item) {
                                console.log('[DEBUG] Processing entry:', item.name, item.isDirectory ? '(directory)' : '(file)');
                                await traverseFileTree(item, '', files);
                            }
                        }
                    } else {
                        // 不支持 webkitGetAsEntry，使用 files 属性
                        const droppedFiles = event.dataTransfer.files;
                        console.log('[DEBUG] Using dataTransfer.files, count:', droppedFiles.length);
                        for (let i = 0; i < droppedFiles.length; i++) {
                            const file = droppedFiles[i];
                            console.log('[DEBUG] File:', file.name, 'webkitRelativePath:', file.webkitRelativePath);
                            // 如果有 webkitRelativePath，使用它；否则使用文件名
                            if (file.webkitRelativePath) {
                                file.relativePath = file.webkitRelativePath;
                            } else {
                                file.relativePath = file.name;
                            }
                            files.push(file);
                        }
                    }

                    console.log('[DEBUG] Total files to upload:', files.length);
                    files.forEach((file, idx) => {
                        console.log(`[DEBUG] File ${idx}:`, {
                            name: file.name,
                            relativePath: file.relativePath,
                            webkitRelativePath: file.webkitRelativePath,
                            size: file.size
                        });
                    });

                    // 上传文件（使用 relativePath 保持文件夹结构）
                    await uploadFiles(files);
                };

                const traverseFileTree = (item, path, files) => {
                    return new Promise((resolve) => {
                        if (item.isFile) {
                            item.file(file => {
                                file.relativePath = path + file.name;
                                console.log('[DEBUG] traverseFileTree - file:', file.name, 'relativePath:', file.relativePath);
                                files.push(file);
                                resolve();
                            });
                        } else if (item.isDirectory) {
                            const dirReader = item.createReader();
                            const readEntries = () => {
                                dirReader.readEntries(async (entries) => {
                                    if (entries.length > 0) {
                                        console.log('[DEBUG] traverseFileTree - directory:', item.name, 'entries:', entries.length);
                                        for (let i = 0; i < entries.length; i++) {
                                            await traverseFileTree(entries[i], path + item.name + '/', files);
                                        }
                                        // 继续读取更多条目
                                        readEntries();
                                    } else {
                                        // 没有更多条目了
                                        resolve();
                                    }
                                });
                            };
                            readEntries();
                        }
                    });
                };

                const uploadFiles = async (fileList, folderName = null) => {
                    if (!fileList || fileList.length === 0) return;

                    console.log('[DEBUG] uploadFiles called, fileList length:', fileList.length, 'folderName:', folderName);

                    // 如果指定了文件夹名称，将文件上传到该文件夹内
                    const uploadPath = folderName
                        ? (currentPath.value ? currentPath.value + '/' + folderName : '/' + folderName)
                        : currentPath.value;

                    console.log('[DEBUG] uploadPath:', uploadPath);

                    const formData = new FormData();
                    for (let file of fileList) {
                        const relativePath = file.relativePath || file.name;
                        console.log('[DEBUG] Appending file:', file.name, 'relativePath:', relativePath);
                        formData.append('files', file);
                        formData.append('relativePaths', relativePath);
                    }

                    try {
                        uploadProgress.value = 0;
                        const response = await fetch(`/api/upload?path=${encodeURIComponent(uploadPath)}`, {
                            method: 'POST',
                            body: formData
                        });

                        const data = await response.json();
                        console.log('[DEBUG] Upload response:', data);

                        if (response.ok) {
                            showMessage(`上传成功: ${data.uploaded.length} 个文件`);
                            loadFiles();
                        } else {
                            showMessage(data.error || '上传失败', 'error');
                        }
                    } catch (error) {
                        console.error('[DEBUG] Upload error:', error);
                        showMessage('上传失败: ' + error.message, 'error');
                    } finally {
                        uploadProgress.value = 100;
                        setTimeout(() => { uploadProgress.value = 0; }, 500);
                    }
                };

                const createFolder = async () => {
                    if (!newFolderName.value.trim()) return;

                    try {
                        const response = await fetch('/api/mkdir', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                path: currentPath.value + '/' + newFolderName.value 
                            })
                        });

                        if (response.ok) {
                            showMessage('文件夹创建成功');
                            showNewFolderModal.value = false;
                            newFolderName.value = '';
                            loadFiles();
                        } else {
                            const data = await response.json();
                            showMessage(data.error || '创建失败', 'error');
                        }
                    } catch (error) {
                        showMessage('创建失败: ' + error.message, 'error');
                    }
                };

                const deleteFile = async (path, skipConfirm = false) => {
                    if (!skipConfirm && !confirm('确定要删除吗？')) return;
                    
                    try {
                        const response = await fetch('/api/delete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ path })
                        });

                        if (response.ok) {
                            showMessage('删除成功');
                            loadFiles();
                        } else {
                            const data = await response.json();
                            showMessage(data.error || '删除失败', 'error');
                        }
                    } catch (error) {
                        showMessage('删除失败: ' + error.message, 'error');
                    }
                };

                const deleteFileSilent = async (path) => {
                    try {
                        const response = await fetch('/api/delete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ path })
                        });
                        return response.ok;
                    } catch (error) {
                        return false;
                    }
                };

                const deleteSelected = async () => {
                    if (selectedFiles.value.length === 0) return;
                    if (!confirm(`确定要删除选中的 ${selectedFiles.value.length} 项吗？`)) return;

                    let successCount = 0;
                    let errorCount = 0;

                    for (const path of selectedFiles.value) {
                        if (await deleteFileSilent(path)) {
                            successCount++;
                        } else {
                            errorCount++;
                        }
                    }

                    if (errorCount === 0) {
                        showMessage(`成功删除 ${successCount} 项`);
                    } else {
                        showMessage(`删除完成：成功 ${successCount} 项，失败 ${errorCount} 项`, 'error');
                    }

                    loadFiles();
                };

                const showRenameModal = (file) => {
                    renameOldPath.value = file.path;
                    renameNewName.value = file.name;
                    showRenameDialog.value = true;
                };

                const doRename = async () => {
                    if (!renameNewName.value.trim()) return;

                    try {
                        const dir = renameOldPath.value.substring(0, renameOldPath.value.lastIndexOf('/'));
                        const response = await fetch('/api/rename', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                oldPath: renameOldPath.value,
                                newPath: dir + '/' + renameNewName.value
                            })
                        });

                        if (response.ok) {
                            showMessage('重命名成功');
                            showRenameDialog.value = false;
                            loadFiles();
                        } else {
                            const data = await response.json();
                            showMessage(data.error || '重命名失败', 'error');
                        }
                    } catch (error) {
                        showMessage('重命名失败: ' + error.message, 'error');
                    }
                };

                const downloadFile = (path) => {
                    window.open(`/api/download?path=${encodeURIComponent(path)}`, '_blank');
                };

                const previewFile = (file) => {
                    previewPath.value = file.path;
                    previewFileName.value = file.name;
                    showPreview.value = true;
                };

                const downloadSelected = () => {
                    if (selectedFiles.value.length === 1) {
                        downloadFile(selectedFiles.value[0]);
                    } else {
                        const paths = JSON.stringify(selectedFiles.value);
                        window.open(`/api/download-zip?paths=${encodeURIComponent(paths)}`, '_blank');
                    }
                };

                onMounted(() => {
                    loadFiles();
                });

                return {
                    files,
                    currentPath,
                    selectedFiles,
                    isDragging,
                    showNewFolderModal,
                    showRenameDialog,
                    newFolderName,
                    renameNewName,
                    uploadProgress,
                    message,
                    messageType,
                    fileInput,
                    folderInput,
                    pathSegments,
                    isAllSelected,
                    navigateTo,
                    navigateUp,
                    navigateToSegment,
                    getFileIcon,
                    formatSize,
                    formatDate,
                    toggleSelectAll,
                    handleFileUpload,
                    handleFolderUpload,
                    handleDrop,
                    createFolder,
                    deleteFile,
                    deleteSelected,
                    showRenameModal,
                    doRename,
                    downloadFile,
                    downloadSelected,
                    previewFile,
                    showPreview,
                    previewPath,
                    previewFileName,
                    previewUrl,
                    isImage,
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
